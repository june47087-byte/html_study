<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상품 소개 페이지</title>
</head>
<body>
  <h2>상품 구성</h2>
  <!-- 설명 목록을 만드는 <dl>,<dt>,<dd> 태그
description list(설명 목록)이란 name(이름)과 값(value) 형태로 된 목록을 말한다. 사전에서 단어명과 설명이 있는 모습 같은거다

설명은 이름값을 말하는 <dt>태그와 값 부분을 지정하는 <dd> 태그로 구성된다. 
<dl></dl>사이에 한쌍의 <dt><dd>태그를 넣는다 이때 <dt>태그 하나에 <dd> 태그 여러개 사용도 가능하다. -->
  <dl>
    <dt>선물용 3kg</dt>
    <dd>소과 13~16과</dd>
    <dd>중과 10~12과</dd>
  </dl>
  <dl>
    <dt>선물용 5kg</dt>
    <dd>중과 15~19과</dd>
  </dl>  
</body>
</html>
